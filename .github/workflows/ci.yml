name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: Create venv and build
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest
          maturin develop --release
      - name: Run core tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v
      - name: Install and test integration
        run: |
          source .venv/bin/activate
          pip install llama-index-core
          pip install -e integrations/llama-index
          cd integrations/llama-index
          IS_TESTING=true pytest tests/ -v
